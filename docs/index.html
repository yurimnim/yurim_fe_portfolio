<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio:Yurim Lee</title>
    <script type="module" crossorigin src="/yurim_fe_portfolio/assets/main.kVNidWns.js"></script>
    <link rel="stylesheet" crossorigin href="/yurim_fe_portfolio/assets/main.BrbqByw_.css">
  </head>
  <body>
    <script>
      (function () {
        var storedTheme = localStorage.getItem('theme');
        var prefersDark =
          typeof window.matchMedia === 'function' &&
          window.matchMedia('(prefers-color-scheme: dark)').matches;

        if ((storedTheme && storedTheme === 'dark') || (!storedTheme && prefersDark)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
  </body>
</html>
